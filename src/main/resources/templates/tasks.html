<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<meta charset="UTF-8">
	<title>タスク管理</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<div class="page-header" sec:authorize="isAuthenticated()">
		<span>ログイン中: <strong th:text="${loginUsername}"></strong></span>
		<form th:action="@{/logout}" method="post" style="display:inline">
			<button type="submit" class="logout_btn" onclick="return confirm('ログアウトしてよろしいでしょうか？')">ログアウト</button>
		</form>
	</div>
	<div class="tasksPage">
		<h1>タスク一覧</h1>

		<!-- タスクが0件のとき -->
		<div th:if="${#lists.isEmpty(tasks)}" class="alert-info">
			現在タスクは登録されていません。「新規作成」から追加してください。
		</div>

		<div th:if="${message}" th:text="${message}" class="alert-info"></div>

		<!-- タスクがあるとき -->
		<table th:if="${not #lists.isEmpty(tasks)}" class="tasksTable">
			<thead>
				<tr>
					<th>ID</th>
					<th>タイトル</th>
					<th>内容</th>
					<th>登録者</th>
					<th>開始日</th>
					<th>終了日</th>
					<th>作成日時</th>
					<th>更新日時</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="task : ${tasks}">
					<td th:text="${task.id}"></td>
					<td th:text="${task.title}"></td>
					<td th:text="${task.content}"></td>
					<td th:text="${task.assigneeName}"></td>
					<td th:text="${task.startDate != null} ? ${#temporals.format(task.startDate, 'yyyy/MM/dd')} : '-'">
					</td>
					<td th:text="${task.endDate != null} ? ${#temporals.format(task.endDate, 'yyyy/MM/dd')} : '-'"></td>
					<td
						th:text="${task.createdAt != null} ? ${#temporals.format(task.createdAt, 'yyyy/MM/dd HH:mm')} : '-'">
					</td>
					<td
						th:text="${task.updatedAt != null} ? ${#temporals.format(task.updatedAt, 'yyyy/MM/dd HH:mm')} : '-'">
					</td>
					<td>
						<a th:href="@{/tasks/edit/{id}(id=${task.id})}" class="btn-edit">編集</a>
						<form th:action="@{/tasks/delete/{id}(id=${task.id})}" method="post" style="display:inline;">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
							<button type="submit" class="btn-delete" onclick="return confirm('本当に削除しますか？')">削除</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>

		<nav th:if="${totalPages > 1}" class="pagination">

			<span th:if="${currentPage == 1}" class="pagination-disabled">« 前</span>
			<a th:if="${currentPage > 1}" th:href="@{/tasks(page=${currentPage - 1})}">« 前</a>

			<span th:each="i : ${#numbers.sequence(1, totalPages)}">
				<strong th:if="${i == currentPage}" th:text="${i}"></strong>
				<a th:if="${i != currentPage}" th:href="@{/tasks(page=${i})}" th:text="${i}"></a>
			</span>

			<span th:if="${currentPage == totalPages}" class="pagination-disabled">次 »</span>
			<a th:if="${currentPage < totalPages}" th:href="@{/tasks(page=${currentPage + 1})}">次 »</a>

		</nav>
		<a th:href="@{/tasks/new}">+新規作成</a>

	</div>

</body>

</html>
