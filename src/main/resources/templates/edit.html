<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク編集</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>タスク編集</h1>

        <form th:action="@{/tasks/update/{id}(id=${task.id})}" th:object="${task}" method="post">
			
			<input type="hidden" th:field="*{username}">


            <div class="form-group">
                <label for="title">タイトル</label>
                <input type="text" id="title" th:field="*{title}" class="form-control">
            </div>

            <div class="form-group">
                <label for="content">内容</label>
                <textarea id="content" th:field="*{content}" class="form-control" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="name">登録者</label>
                <input type="text" id="name" th:field="*{name}" class="form-control">
            </div>

            <div class="form-group">
                <label for="startDate">開始日</label>
                <input type="date" id="startDate" th:field="*{startDate}" class="form-control">
            </div>

            <div class="form-group">
                <label for="endDate">終了日</label>
                <input type="date" id="endDate" th:field="*{endDate}" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary">更新</button>
            <a th:href="@{/tasks}" class="btn btn-secondary">← キャンセル</a>
        </form>
    </div>
</body>
</html>
