<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ユーザー登録</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<!--新規登録画面-->

<body>

	<div class="loginBlock">
		<div class="registerPage">
			<h1>ユーザ登録</h1>

			<form th:action="@{/register}" method="post">
				<label for="username">ユーザ名（半角英字）</label>
				<input type="text" id="username" name="username" class="registerForm" required pattern="[a-zA-Z]+"
					title="半角英字のみ入力してください">

				<label for="password">パスワード（半角英数字）</label>
				<input type="password" id="password" name="password" class="registerForm" required
					pattern="[a-zA-Z0-9]+" title="半角英数字で入力してください">

				<button type="submit" class="formLogin_button">登録</button>

				<a th:href="@{/login}" class="formLogin_link">ログインはこちら</a>
			</form>
		</div>
	</div>

</body>

</html>
