<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ユーザー登録</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<!--新規登録画面-->

<body>

	<div class="loginBlock">
		<div class="registerPage">
			<h1>ユーザ登録</h1>
			

			<form th:action="@{/register}" th:object="${form}" method="post">
				<p th:if="${#fields.hasGlobalErrors()}" 
							   th:errors="*{global}" style="color:red"></p>
			    <label for="username">ユーザ名（半角英字）</label>
			    <input type="text" id="username" th:field="*{username}" class="registerForm">
			    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color:red"></p>

			    <label for="password">パスワード（半角英数字）</label>
			    <input type="password" id="password" th:field="*{password}" class="registerForm">
			    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red"></p>

			    <button type="submit" class="formLogin_button">登録</button>
			    <a th:href="@{/login}" class="formLogin_link">ログインはこちら</a>
			</form>
		</div>
	</div>

</body>

</html>
